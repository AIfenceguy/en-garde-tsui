<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fbfbfd" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="manifest.json" />
    <title>En Garde</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <link rel="stylesheet" href="css/style.css" />
    <!-- css/en-garde.css removed: was a stale duplicate that re-overrode
         every contrast/token fix landed in style.css. style.css is the
         single source of truth for all styling. -->
    <link rel="stylesheet" href="css/apple.css" />
</head>
<body data-active-role="">
    <!-- top bar -->
    <header class="topbar">
        <div class="topbar-left">
            <button id="profile-switcher" class="profile-switcher" aria-label="Switch profile">
                <span class="profile-mark" aria-hidden="true"></span>
                <span class="profile-name">—</span>
                <span class="caret">▾</span>
            </button>
        </div>
        <h1 class="brand">En Garde</h1>
        <div class="topbar-right">
            <span id="tournament-countdown" class="countdown" aria-live="polite"></span>
        </div>
    </header>

    <!-- profile menu (hidden by default) -->
    <div id="profile-menu" class="profile-menu" hidden></div>

    <!-- offline indicator -->
    <div id="offline-banner" class="offline-banner" hidden>
        Offline · changes will sync when you reconnect
    </div>

    <!-- main mount point -->
    <main id="app" class="app"></main>

    <!-- bottom nav (mobile) — SF-Symbols-style SVG icons -->
    <nav class="bottom-nav" id="bottom-nav" aria-label="Primary">
        <a href="#dashboard" data-route="dashboard">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="9"></circle>
                    <path d="M12 7v5l3 2"></path>
                </svg>
            </span>
            <span class="nav-label">Today</span>
        </a>
        <a href="#bouts" data-route="bouts">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 20l9-9"></path>
                    <path d="M14 4l6 6"></path>
                    <path d="M19 4l1 1"></path>
                    <path d="M14 4l-9 9 5 5 9-9"></path>
                </svg>
            </span>
            <span class="nav-label">Bouts</span>
        </a>
        <a href="#opponents" data-route="opponents">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="9"></circle>
                    <circle cx="12" cy="12" r="5"></circle>
                    <circle cx="12" cy="12" r="1.6"></circle>
                </svg>
            </span>
            <span class="nav-label">Scout</span>
        </a>
        <a href="#physical" data-route="physical">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 9h2v6H6z"></path>
                    <path d="M16 9h2v6h-2z"></path>
                    <path d="M8 12h8"></path>
                    <path d="M3 11h2v2H3z"></path>
                    <path d="M19 11h2v2h-2z"></path>
                </svg>
            </span>
            <span class="nav-label">Body</span>
        </a>
        <a href="#mental" data-route="mental">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M9 4a4 4 0 0 0-4 4v3a4 4 0 0 0 1 2.6V18a2 2 0 0 0 2 2h2v-7"></path>
                    <path d="M15 4a4 4 0 0 1 4 4v3a4 4 0 0 1-1 2.6V18a2 2 0 0 1-2 2h-2v-7"></path>
                </svg>
            </span>
            <span class="nav-label">Mind</span>
        </a>
        <a href="#lessons" data-route="lessons">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 5h11l3 3v11H5z"></path>
                    <path d="M8 9h8"></path>
                    <path d="M8 13h8"></path>
                    <path d="M8 17h5"></path>
                </svg>
            </span>
            <span class="nav-label">Lessons</span>
        </a>
    </nav>

    <!-- toast region -->
    <div id="toast-region" class="toast-region" aria-live="polite"></div>

    <!-- supabase + app -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
