<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0e0d0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <title>Atelier Tsui</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/atelier.css" />
</head>
<body data-active-role="">
    <header class="topbar">
        <div class="topbar-left">
            <button id="profile-switcher" class="profile-switcher" aria-label="Switch profile">
                <span class="profile-mark" aria-hidden="true"></span>
                <span class="profile-name">—</span>
                <span class="caret">▾</span>
            </button>
        </div>
        <h1 class="brand">Atelier Tsui</h1>
        <div class="topbar-right">
            <span id="tournament-countdown" class="countdown" aria-live="polite"></span>
        </div>
    </header>
    <div id="profile-menu" class="profile-menu" hidden></div>
    <div id="offline-banner" class="offline-banner" hidden>
        Offline · changes will sync when you reconnect
    </div>
    <main id="app" class="app"></main>
    <nav class="bottom-nav" id="bottom-nav" aria-label="Primary">
        <a href="#dashboard" data-route="dashboard">
            <span class="nav-icon">◇</span><span class="nav-label">Today</span>
        </a>
        <a href="#bouts" data-route="bouts">
            <span class="nav-icon">⚔</span><span class="nav-label">Bouts</span>
        </a>
        <a href="#opponents" data-route="opponents">
            <span class="nav-icon">◉</span><span class="nav-label">Scout</span>
        </a>
        <a href="#physical" data-route="physical">
            <span class="nav-icon">▲</span><span class="nav-label">Body</span>
        </a>
        <a href="#mental" data-route="mental">
            <span class="nav-icon">◎</span><span class="nav-label">Mind</span>
        </a>
        <a href="#lessons" data-route="lessons">
            <span class="nav-icon">✎</span><span class="nav-label">Lessons</span>
        </a>
    </nav>
    <div id="toast-region" class="toast-region" aria-live="polite"></div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
